services:
  # ========== FastAPI 后端服务（开发模式） ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scraper-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./spider:/app/spider
      - ./output:/app/output
      - ./uploads:/app/uploads
    environment:
      LOG_LEVEL: INFO
      PYTHONPATH: /app:/app/spider
    command: >
      sh -c "mkdir -p /app/output /app/uploads && python -m backend.seed && uvicorn api:app --host 0.0.0.0 --port 8000 --reload"

  # ========== Vue 前端开发服务器 ==========
  frontend:
    image: node:18-alpine
    container_name: scraper-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
